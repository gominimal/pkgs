name: New Minimal Package Request
description: Request a new package be added to Minimal
title: "[PkgReq] "
labels: ["pkgreq", "triage"]
type: Task
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new package! If you'd rather send the package yourself as a pull request, see [CONTRIBUTING.md](https://github.com/gominimal/pkgs/blob/main/CONTRIBUTING.md) — we welcome PRs for new packages.
  - type: input
    id: package-name
    attributes:
      label: Package name
      description: The name you'd expect to type after `min add`. e.g. `ripgrep`, `python`, `jq`
    validations:
      required: true
  - type: input
    id: upstream-url
    attributes:
      label: Upstream project URL
      description: Homepage or canonical source repo. Please verify it's the current canonical location (renames/transfers happen).
    validations:
      required: true
  - type: textarea
    id: what-does-it-provide
    attributes:
      label: What does this package provide?
      description: One or two sentences on what it is and what it's useful for.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why would you like to see it in Minimal?
      description: Optional — your use case helps us prioritize.
    validations:
      required: false
  - type: textarea
    id: anything-else
    attributes:
      label: Anything else?
      description: Optional — known build quirks, required system dependencies, alternative upstream forks, etc.
    validations:
      required: false
