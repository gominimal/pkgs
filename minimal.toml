[stdlib]
minimum_version = "0.0.18"

[tasks.shell]
interactive = true
packages = ["base", "bash", "claude-code", "claude-code-minimal-plugin", "curl"]
exec = "bash --noprofile -l"

[tasks.claude]
interactive = true
packages = ["base", "bash", "claude-code", "claude-code-minimal-plugin", "curl"]
exec = "claude --dangerously-skip-permissions"

[tasks.opencode]
interactive = true
packages = ["base", "bash", "opencode", "curl"]
exec = "opencode"
